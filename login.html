<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login - Urban Drips</title>

     <link rel="stylesheet" href="style.css">

</head>

<body>

    <section class="login-section">

        <div class="login-box">

            <h2>Login / Signup</h2>

            <form id="signupForm">

                <input
                    type="text"
                    id="username"
                    placeholder="Enter Username"
                >

                <input
                    type="email"
                    id="email"
                    placeholder="Enter Email"
                >

                <input
                    type="password"
                    id="password"
                    placeholder="Enter Password"
                >

                <button type="submit">

                    Create Account

                </button>

                <p id="message"></p>

            </form>

        </div>

    </section>



    <script src="js/script.js"></script>

</body>

</html>
